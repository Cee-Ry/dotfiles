[username]
show_always = true
style_user = "bg:#9A348E"
style_root = "bg:#9A348E"
format = '[ $user ]($style)'
disabled = false

[directory]
#style = "bg:#DA627D"
#format = "[ $path ]($style)"
#truncation_length = 3
#truncation_symbol = "‚Ä¶/"
truncation_length = 2
truncation_symbol = "‚Ä¶/"
style = "bg:#DA627D"
format = "[ $path ]($style)"

[git_branch]
symbol = "Ôźė"
style = "bg:#FCA17D"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#FCA17D"
format = '[$all_status$ahead_behind ]($style)'

[c]
format = "[C]($style)"

[time]
disabled = false
time_format = "%R"
style = "bg:#06969A"
format = '[ Ôźļ $time ]($style)'

[character]
success_symbol = "[‚ĚĮ](bold green)"
error_symbol = "[‚ĚĮ](bold red)"
